<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Kök Börü — an interactive comic</title>
<style>
/* ============================================================
   KÖK BÖRÜ — a Florence-style interactive comic
   Palette shifts per chapter; panels are the storytelling.
   ============================================================ */
:root{
  --gutter:#0a0908;
  --paper:#f0e3cc; --ink:#241812; --accent:#b8412f; --glow:#ff9a3c;
  --soft:rgba(36,24,18,.55);
}
body[data-ch="2"]{ --paper:#0e1a2c; --ink:#dfe8ef; --accent:#ffd166; --glow:#6fa3c8; --soft:rgba(223,232,239,.5); }
body[data-ch="3"]{ --paper:#121a24; --ink:#9fb4c8; --accent:#ffd166; --glow:#8fd3ff; --soft:rgba(159,180,200,.5); }
body[data-ch="4"]{ --paper:#c9a06b; --ink:#241812; --accent:#b8412f; --glow:#ffd166; --soft:rgba(36,24,18,.55); }
body[data-ch="5"]{ --paper:#e8dcc4; --ink:#1d2733; --accent:#b8412f; --glow:#ff9a3c; --soft:rgba(29,39,51,.55); }

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:var(--gutter);display:flex;align-items:center;justify-content:center;
  font-family:Georgia,'Times New Roman',serif;overflow:hidden;
  transition:background .8s ease}

/* ---------- the book ---------- */
#book{position:relative;width:min(94vw,460px);height:min(96vh,780px);
  max-height:96vh;aspect-ratio:9/15;
  background:var(--paper);border-radius:10px;overflow:hidden;
  box-shadow:0 30px 80px rgba(0,0,0,.6);
  transition:background .9s ease;touch-action:none;user-select:none}
#page{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:26px 22px 64px;
  opacity:1;transform:none;transition:opacity .45s ease,transform .45s ease}
#page.out{opacity:0;transform:translateY(-16px)}
#page.pre{opacity:0;transform:translateY(22px);transition:none}

/* ---------- chrome ---------- */
#progress{position:absolute;top:14px;left:0;right:0;display:flex;gap:9px;
  justify-content:center;z-index:5;pointer-events:none}
#progress i{width:7px;height:7px;border-radius:50%;
  border:1.4px solid var(--soft);transition:background .4s,border-color .4s}
#progress i.on{background:var(--accent);border-color:var(--accent)}

#mute,#restart{position:absolute;top:8px;z-index:6;background:none;border:none;
  color:var(--soft);font-family:'Courier New',monospace;font-size:11px;
  letter-spacing:.18em;cursor:pointer;padding:8px}
#mute{right:10px} #restart{left:10px}
#mute:hover,#restart:hover{color:var(--accent)}
#mute:focus-visible,#restart:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

#chev{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
  z-index:5;color:var(--accent);font-size:20px;opacity:0;pointer-events:none;
  transition:opacity .4s;animation:bob 1.6s ease-in-out infinite}
#chev.show{opacity:.9}
@keyframes bob{0%,100%{transform:translate(-50%,0)}50%{transform:translate(-50%,6px)}}

#hint{position:absolute;bottom:34px;left:0;right:0;text-align:center;z-index:5;
  font-family:'Courier New',monospace;font-size:10.5px;letter-spacing:.28em;
  text-transform:uppercase;color:var(--soft);opacity:0;transition:opacity .5s;
  pointer-events:none;padding:0 20px}
#hint.show{opacity:1}

/* ---------- title / chapter cards ---------- */
.card{text-align:center;color:var(--ink)}
.card .eyebrow{font-family:'Courier New',monospace;font-size:11px;
  letter-spacing:.5em;text-transform:uppercase;color:var(--accent);margin-bottom:22px}
.card h1{font-size:44px;letter-spacing:.14em;font-weight:normal;line-height:1.15}
.card h2{font-size:26px;letter-spacing:.2em;font-weight:normal}
.card .sub{font-style:italic;font-size:15px;margin-top:18px;color:var(--soft)}
.card .orn{width:150px;margin:26px auto 0;display:block;opacity:.85}
.card .num{font-family:'Courier New',monospace;font-size:12px;letter-spacing:.6em;
  color:var(--soft);margin-bottom:14px}

/* ---------- panels ---------- */
.panels{width:100%;display:flex;flex-direction:column;gap:14px;align-items:center}
.panel{width:100%;background:var(--paper);border:2px solid var(--ink);
  border-radius:3px;overflow:hidden;position:relative;
  box-shadow:4px 5px 0 rgba(0,0,0,.22);
  opacity:0;transform:translateY(18px) rotate(var(--tilt,0deg)) scale(.985);
  transition:opacity .55s ease,transform .55s cubic-bezier(.2,.7,.3,1.05)}
.panel.show{opacity:1;transform:translateY(0) rotate(var(--tilt,0deg)) scale(1)}
.panel svg{display:block;width:100%;height:auto}
.panel.wide{--tilt:-.5deg} .panel.b{--tilt:.6deg} .panel.c{--tilt:-.35deg}

.caption{align-self:flex-start;max-width:82%;background:var(--paper);
  border:1.6px solid var(--ink);padding:7px 12px;font-style:italic;
  font-size:14.5px;color:var(--ink);box-shadow:3px 3px 0 rgba(0,0,0,.2);
  opacity:0;transform:translateY(10px);transition:all .5s ease .1s}
.caption.show{opacity:1;transform:none}
.caption.end{align-self:flex-end}

/* torn panel (the choice) */
.tearable{transition:transform 1.4s cubic-bezier(.6,-.2,.8,.5),opacity 1.4s ease}
.tearable.torn{transform:translate(46%,-16%) rotate(14deg) scale(.92);opacity:0}

/* match cut */
.match{position:relative;width:100%}
.match .frame{visibility:hidden}
.match .frame svg{display:block;width:100%;height:auto}
.match .layer{position:absolute;inset:0}
.match .layer svg{display:block;width:100%;height:100%}
.match .top{transition:opacity 2.4s ease}

/* end */
#replay{margin-top:26px;background:none;border:1.6px solid var(--accent);
  color:var(--accent);font-family:Georgia,serif;letter-spacing:.3em;
  text-transform:uppercase;font-size:12px;padding:12px 26px;cursor:pointer}
#replay:hover{background:var(--accent);color:var(--paper)}
#replay:focus-visible{outline:2px solid var(--ink);outline-offset:3px}

.fadein{animation:fin 1.2s ease both}
@keyframes fin{from{opacity:0}to{opacity:1}}

@media (prefers-reduced-motion:reduce){
  #chev{animation:none}
  .panel,.caption,#page{transition-duration:.15s}
  .tearable{transition-duration:.5s}
  .match svg{transition-duration:.8s}
}
</style>
</head>
<body data-ch="1">
<div id="book">
  <div id="progress"></div>
  <button id="restart" title="Restart">⟲</button>
  <button id="mute" title="Sound">SOUND ON</button>
  <div id="page"></div>
  <div id="hint"></div>
  <div id="chev">▾</div>
</div>

<script>
/* ============================================================
   Tiny audio: pentatonic plucks + chapter drones + wind
   ============================================================ */
const AudioSys={ctx:null,gain:null,muted:false,drone:null,
  ensure(){ if(this.ctx)return;
    const AC=window.AudioContext||window.webkitAudioContext; if(!AC)return;
    this.ctx=new AC(); this.gain=this.ctx.createGain();
    this.gain.gain.value=this.muted?0:0.8; this.gain.connect(this.ctx.destination);},
  pluck(f,vol=.25,dur=1.1){ if(!this.ctx||this.muted)return;
    const t=this.ctx.currentTime,o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type='triangle';o.frequency.value=f;
    g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);
    o.connect(g);g.connect(this.gain);o.start(t);o.stop(t+dur);},
  thump(vol=.5){ if(!this.ctx||this.muted)return;
    const t=this.ctx.currentTime,o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type='sine';o.frequency.setValueAtTime(110,t);
    o.frequency.exponentialRampToValueAtTime(46,t+.16);
    g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.001,t+.3);
    o.connect(g);g.connect(this.gain);o.start(t);o.stop(t+.32);},
  wind(dur=1){ if(!this.ctx||this.muted)return;
    const t=this.ctx.currentTime,n=this.ctx.createBufferSource();
    const len=this.ctx.sampleRate*dur,buf=this.ctx.createBuffer(1,len,this.ctx.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*.5;
    n.buffer=buf;const f=this.ctx.createBiquadFilter();f.type='bandpass';
    f.frequency.setValueAtTime(300,t);f.frequency.exponentialRampToValueAtTime(900,t+dur*.6);
    f.frequency.exponentialRampToValueAtTime(250,t+dur);f.Q.value=1.2;
    const g=this.ctx.createGain();g.gain.setValueAtTime(.0001,t);
    g.gain.exponentialRampToValueAtTime(.35,t+dur*.25);
    g.gain.exponentialRampToValueAtTime(.0001,t+dur);
    n.connect(f);f.connect(g);g.connect(this.gain);n.start(t);n.stop(t+dur);},
  setDrone(root){ if(!this.ctx)return; this.stopDrone();
    if(this.muted||!root)return;
    const t=this.ctx.currentTime,g=this.ctx.createGain();
    g.gain.setValueAtTime(.0001,t);g.gain.linearRampToValueAtTime(.045,t+2);
    g.connect(this.gain);
    const os=[root,root*1.5,root*2.01].map(f=>{
      const o=this.ctx.createOscillator();o.type='sine';o.frequency.value=f;
      o.connect(g);o.start(t);return o;});
    this.drone={g,os};},
  stopDrone(){ if(!this.drone)return; const t=this.ctx.currentTime;
    this.drone.g.gain.linearRampToValueAtTime(.0001,t+1.2);
    this.drone.os.forEach(o=>o.stop(t+1.3)); this.drone=null;}
};
const PENTA=[220,261.6,293.7,329.6,392,440,523.2];
const note=i=>PENTA[((i%PENTA.length)+PENTA.length)%PENTA.length];

    ${i===2?`<g fill="var(--accent)"><ellipse cx="70" cy="17" rx="2" ry="1.1"/><ellipse cx="76" cy="17" rx="2" ry="1.1"/></g>`:''}

/* ============================================================
   Engine
   ============================================================ */
const page=document.getElementById('page'), hint=document.getElementById('hint'),
      chev=document.getElementById('chev'), progress=document.getElementById('progress');
let idx=-1, beat=null, cleanupFns=[], rafs=[], timers=[];
function later(fn,ms){timers.push(setTimeout(fn,ms));}
function everyFrame(fn){let id;const loop=t=>{fn(t);id=requestAnimationFrame(loop);};
  id=requestAnimationFrame(loop);rafs.push(()=>cancelAnimationFrame(id));}
function clearBeat(){cleanupFns.forEach(f=>f());cleanupFns=[];
  rafs.forEach(f=>f());rafs=[];timers.forEach(t=>clearTimeout(t));timers=[];}
function setHint(t){hint.textContent=t||'';hint.classList.toggle('show',!!t);}
function markDone(){beat.done=true;chev.classList.add('show');setHint('');AudioSys.pluck(note(6),.18,1.6);}
function panelHTML(svg,cls=''){return `<div class="panel ${cls}">${svg}</div>`;}
function captionHTML(t,end=''){return `<div class="caption ${end}">${t}</div>`;}
function revealSeq(sel,base=250,step=520){
  [...page.querySelectorAll(sel)].forEach((el,i)=>later(()=>{el.classList.add('show');
    AudioSys.pluck(note(i+1),.1,1);},base+i*step));}
function pointOf(e,svg){const r=svg.getBoundingClientRect();
  const vb=svg.viewBox.baseVal;
  return {x:(e.clientX-r.left)/r.width*vb.width, y:(e.clientY-r.top)/r.height*vb.height};}

/* ---------- interactions ---------- */
function interCradle(){
  page.innerHTML=`<div class="panels">${panelHTML(S.motherTwoCradles(),'wide')}
    ${panelHTML(S.cradleScene(),'b')}${captionHTML('Winter came early that year.')}</div>`;
  revealSeq('.panel,.caption');
  setHint('drag the cradle — six slow swings');
  const svg=page.querySelectorAll('svg')[1], crd=svg.querySelector('#crd'),
        notes=svg.querySelector('#notes'), eye=svg.querySelector('#babyeye');
  let angle=0,dragging=false,lastSide=0,swings=0,noteI=0;
  const onDown=e=>{dragging=true;svg.setPointerCapture?.(e.pointerId);};
  const onMove=e=>{if(!dragging||beat.done)return;
    const p=pointOf(e,svg);angle=Math.max(-24,Math.min(24,(p.x-50)*1.1));
    crd.style.transform=`rotate(${angle}deg)`;
    const side=angle>14?1:angle<-14?-1:0;
    if(side!==0&&side!==lastSide){ if(lastSide!==0){swings++;
        AudioSys.pluck(note(noteI++),.22,1.4);
        const n=document.createElementNS('http://www.w3.org/2000/svg','text');
        n.setAttribute('x',30+Math.random()*40);n.setAttribute('y',18+Math.random()*8);
        n.textContent='♪';n.setAttribute('fill','var(--accent)');n.setAttribute('font-size','5.5');
        notes.appendChild(n);later(()=>n.remove(),1400);
        if(swings>=6){eye.setAttribute('d','M47.6 39.2 h4.8');
          later(()=>{crd.style.transition='transform 1.2s ease';crd.style.transform='rotate(0deg)';markDone();},300);}
      } lastSide=side;}};
  const onUp=()=>{dragging=false;};
  svg.addEventListener('pointerdown',onDown);
  addEventListener('pointermove',onMove);addEventListener('pointerup',onUp);
  cleanupFns.push(()=>{removeEventListener('pointermove',onMove);removeEventListener('pointerup',onUp);});
}

function interFlame(){
  page.innerHTML=`<div class="panels">${captionHTML('Three days of white.')}
    ${panelHTML(S.flameScene(),'wide')}</div>`;
  revealSeq('.panel,.caption');
  setHint('when the wind comes — hold the flame');
  const svg=page.querySelector('.panel svg'),flameG=svg.querySelector('#flameg'),
        gust=svg.querySelector('#gustlines'),ring=svg.querySelector('#holdring'),
        shieldsG=svg.querySelector('#shields');
  let holding=false,shields=0,gustOn=false,scale=1,nextGust=performance.now()+1600;
  const down=()=>{holding=true;}, up=()=>{holding=false;};
  svg.addEventListener('pointerdown',down);addEventListener('pointerup',up);
  cleanupFns.push(()=>removeEventListener('pointerup',up));
  everyFrame(now=>{
    if(beat.done)return;
    /* flicker */
    const f=1+Math.sin(now/90)*.04;
    flameG.style.transform=`scale(${scale*f})`;
    ring.setAttribute('opacity',holding?'1':'.55');
    ring.style.strokeDashoffset=(now/60)%14;
    if(!gustOn&&now>nextGust){gustOn=true;AudioSys.wind(1.5);
      gust.style.transition='opacity .3s';gust.style.opacity='.8';
      const start=now;
      const check=()=>{ if(performance.now()-start>1300){gustOn=false;
          gust.style.opacity='0';nextGust=performance.now()+1900;
          if(holding){shields++;scale=Math.min(1.15,scale+.08);
            const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
            c.setAttribute('cx',34+shields*10);c.setAttribute('cy',8);c.setAttribute('r',2);
            c.setAttribute('fill','var(--glow)');shieldsG.appendChild(c);
            AudioSys.pluck(note(3+shields),.22,1.2);
            if(shields>=3){later(()=>markDone(),500);}
          } else { scale=Math.max(.5,scale-.28);AudioSys.thump(.25);}
        } else timers.push(setTimeout(check,80)); };
      check();}
    /* wind lines drift */
    if(gustOn) gust.style.transform=`translateX(${(now/6)%70}px)`;
  });
}

function interChoice(){
  page.innerHTML=`<div class="panels">${panelHTML(S.choiceScene(),'wide')}</div>`;
  revealSeq('.panel');
  setHint('reach');
  const svg=page.querySelector('svg'),hand=svg.querySelector('#handg'),
        kidL=svg.querySelector('#kidL'),kidR=svg.querySelector('#kidR'),
        eyesB=svg.querySelector('#eyesBehind');
  let dragging=false,hx=50,hy=54,nearSince=0,nearSide=0,resolved=false;
  const move=e=>{if(!dragging||resolved)return;const p=pointOf(e,svg);
    hx=Math.max(8,Math.min(92,p.x));hy=Math.max(10,Math.min(58,p.y));
    hand.setAttribute('transform',`translate(${hx-50} ${hy-54})`);
    const dL=Math.hypot(hx-21,hy-22),dR=Math.hypot(hx-79,hy-22);
    const side=dL<11?-1:dR<11?1:0;
    if(side!==nearSide){nearSide=side;nearSince=performance.now();}
    if(side!==0&&performance.now()-nearSince>450) resolve(side);};
  function resolve(side){resolved=true;dragging=false;
    const kept=side<0?kidL:kidR, lost=side<0?kidR:kidL;
    kept.querySelector('rect').setAttribute('stroke','var(--accent)');
    AudioSys.pluck(note(2),.25,2);
    eyesB.setAttribute('transform',`translate(${side<0?76:18} 20)`);
    later(()=>{lost.classList.add('torn');
      lost.style.transition='transform 1.5s cubic-bezier(.6,-.2,.8,.5),opacity 1.5s';
      lost.style.transform=`translate(${side<0?40:-40}px,-14px) rotate(${side<0?12:-12}deg)`;
      lost.style.opacity='0';AudioSys.wind(2);AudioSys.thump(.5);
      eyesB.style.transition='opacity 1.6s';eyesB.style.opacity='.9';},350);
    later(()=>{const cap=document.createElement('div');
      cap.className='caption end';cap.textContent='The steppe kept the other.';
      page.querySelector('.panels').appendChild(cap);
      requestAnimationFrame(()=>cap.classList.add('show'));
      markDone();},2200);}
  hand.addEventListener('pointerdown',e=>{dragging=true;svg.setPointerCapture?.(e.pointerId);});
  svg.addEventListener('pointerdown',e=>{dragging=true;});
  addEventListener('pointermove',move);
  const up=()=>{dragging=false;};addEventListener('pointerup',up);
  cleanupFns.push(()=>{removeEventListener('pointermove',move);removeEventListener('pointerup',up);});
}

function interScent(){
  page.innerHTML=`<div class="panels">${panelHTML(S.scentScene(),'wide')}
    ${captionHTML('Something older than the pack calls her.','end')}</div>`;
  revealSeq('.panel,.caption');
  setHint('press — and follow what the wind carries');
  const svg=page.querySelector('svg'),trail=svg.querySelector('#trail'),
        sash=svg.querySelector('#sash');
  const pts=[];for(let i=0;i<12;i++){const t=i/11;
    pts.push({x:20+t*62,y:38+Math.sin(t*5)*9-t*4});}
  pts.forEach((p,i)=>{const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx',p.x);c.setAttribute('cy',p.y);c.setAttribute('r',i===0?2.4:1.6);
    c.setAttribute('fill','var(--accent)');c.setAttribute('opacity',i===0?'.9':'.22');
    trail.appendChild(c);p.el=c;});
  let nextI=0,down=false;
  const move=e=>{if(!down||beat.done||nextI>=pts.length)return;
    const p=pointOf(e,svg),t=pts[nextI];
    if(Math.hypot(p.x-t.x,p.y-t.y)<7){t.el.setAttribute('opacity','1');
      t.el.setAttribute('r','2.4');
      if(nextI>0){const l=document.createElementNS('http://www.w3.org/2000/svg','line');
        const a=pts[nextI-1];l.setAttribute('x1',a.x);l.setAttribute('y1',a.y);
        l.setAttribute('x2',t.x);l.setAttribute('y2',t.y);
        l.setAttribute('stroke','var(--accent)');l.setAttribute('stroke-width','1');
        l.setAttribute('opacity','.8');trail.appendChild(l);}
      AudioSys.pluck(note(nextI),.14,.9);nextI++;
      if(nextI<pts.length)pts[nextI].el.setAttribute('opacity','.6');
      if(nextI>=pts.length){sash.style.transition='opacity 1.4s';
        sash.style.opacity='1';AudioSys.pluck(note(9),.3,2.4);
        later(()=>markDone(),900);}}};
  const d=e=>{down=true;move(e);},u=()=>{down=false;};
  svg.addEventListener('pointerdown',d);addEventListener('pointermove',move);
  addEventListener('pointerup',u);
  cleanupFns.push(()=>{removeEventListener('pointermove',move);removeEventListener('pointerup',u);});
}

function interGallop(){
  page.innerHTML=`<div class="panels">${panelHTML(S.gallopScene(),'wide')}
    ${captionHTML('The drums find her heartbeat and keep it.')}</div>`;
  revealSeq('.panel,.caption');
  setHint('tap when the ring meets the drum — eight beats');
  const svg=page.querySelector('svg'),ring=svg.querySelector('#beatRing'),
        legsA=svg.querySelector('#legsA'),legsB=svg.querySelector('#legsB'),
        speed=svg.querySelector('#speed'),horse=svg.querySelector('#horse');
  const PERIOD=760;let t0=performance.now(),hits=0,frame=0,lastB=-1;
  everyFrame(now=>{if(beat.done)return;
    const ph=((now-t0)%PERIOD)/PERIOD;
    const r=30-ph*20;ring.setAttribute('r',r);
    ring.setAttribute('opacity',(ph*.9).toFixed(2));
    const bnum=Math.floor((now-t0)/PERIOD);
    if(bnum!==lastB){lastB=bnum;AudioSys.thump(.18);}
    horse.style.transform=`translateY(${Math.sin(now/120)*(hits*.3)}px)`;});
  const tap=()=>{if(beat.done)return;
    const ph=((performance.now()-t0)%PERIOD)/PERIOD;
    if(ph>.78||ph<.14){hits++;AudioSys.thump(.5);AudioSys.pluck(note(hits),.2,.8);
      frame^=1;legsA.setAttribute('opacity',frame?0:1);legsB.setAttribute('opacity',frame?1:0);
      const l=document.createElementNS('http://www.w3.org/2000/svg','path');
      const y=26+Math.random()*26;
      l.setAttribute('d',`M${2+Math.random()*8} ${y} h${10+hits*2}`);
      l.setAttribute('stroke','var(--ink)');l.setAttribute('stroke-width','1.1');
      speed.appendChild(l);speed.setAttribute('opacity',Math.min(.7,hits*.1));
      if(hits>=8)later(()=>markDone(),400);}
    else AudioSys.pluck(110,.08,.3);};
  svg.addEventListener('pointerdown',tap);
}

function interScoop(){
  page.innerHTML=`<div class="panels">${panelHTML(S.scoopScene(),'wide')}
    ${captionHTML('Only one thing on this field weighs enough to matter.','end')}</div>`;
  revealSeq('.panel,.caption');
  setHint('lean — drag down through the prize, then up');
  const svg=page.querySelector('svg'),bundle=svg.querySelector('#bundle'),
        rider=svg.querySelector('#rider'),body=svg.querySelector('#riderBody'),
        guide=svg.querySelector('#guide');
  let down=false,dipped=false,startY=0;
  const move=e=>{if(!down||beat.done)return;const p=pointOf(e,svg);
    const lean=Math.max(0,Math.min(1,(p.y-34)/22));
    body.style.transform=`rotate(${lean*46}deg)`;
    body.style.transformOrigin='38px 34px';
    if(!dipped&&p.y>52&&Math.abs(p.x-62)<12){dipped=true;
      bundle.style.transition='none';AudioSys.thump(.35);}
    if(dipped){bundle.style.transform=`translate(${p.x-62}px, ${Math.min(0,p.y-57)}px)`;}
    if(dipped&&p.y<36){succeed();}};
  function succeed(){beatDone=true;
    guide.style.transition='opacity .6s';guide.style.opacity='0';
    bundle.style.transition='transform .7s cubic-bezier(.2,.8,.3,1.1)';
    bundle.style.transform='translate(-19px,-24px)';
    body.style.transition='transform .5s';body.style.transform='rotate(0deg)';
    AudioSys.pluck(note(8),.3,2);AudioSys.thump(.6);
    const svgEl=svg;svgEl.style.transition='transform 1.4s ease';
    svgEl.style.transform='scale(1.06)';
    later(()=>markDone(),800);}
  let beatDone=false;
  const d=e=>{down=true;dipped=false;},u=()=>{down=false;if(!beatDone){body.style.transform='rotate(0deg)';}};
  svg.addEventListener('pointerdown',d);addEventListener('pointermove',move);
  addEventListener('pointerup',u);
  cleanupFns.push(()=>{removeEventListener('pointermove',move);removeEventListener('pointerup',u);});
}

function interJigsaw(){
  page.innerHTML=`<div class="panels">${captionHTML('Torn things remember their shape.')}
    ${panelHTML(S.jigsawScene(),'wide')}</div>`;
  revealSeq('.panel,.caption');
  setHint('mend what was torn — drag the pieces home');
  const svg=page.querySelector('.panel svg'),slots=svg.querySelector('#slots'),
        piecesG=svg.querySelector('#pieces'),oglow=svg.querySelector('#oglow');
  /* four ram's-horn quarters around center 50,30 */
  const quarter=`M0 0 q14-2 14 12 q0 9 -8 9 q-6 0 -6-6 q0-4 4-4`;
  const defs=[{r:0,tx:50,ty:30},{r:90,tx:50,ty:30},{r:180,tx:50,ty:30},{r:270,tx:50,ty:30}];
  const scatter=[{x:16,y:58,r:35},{x:40,y:62,r:-20},{x:64,y:60,r:50},{x:86,y:57,r:-40}];
  const state=[];
  defs.forEach((d,i)=>{
    const ghost=document.createElementNS('http://www.w3.org/2000/svg','path');
    ghost.setAttribute('d',quarter);
    ghost.setAttribute('transform',`translate(${d.tx} ${d.ty}) rotate(${d.r})`);
    ghost.setAttribute('fill','none');ghost.setAttribute('stroke','var(--soft)');
    ghost.setAttribute('stroke-width','.8');ghost.setAttribute('stroke-dasharray','2 2');
    slots.appendChild(ghost);
    const g=document.createElementNS('http://www.w3.org/2000/svg','g');
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',quarter);p.setAttribute('fill','var(--accent)');
    p.setAttribute('transform',`rotate(${d.r})`);
    g.appendChild(p);piecesG.appendChild(g);
    const st={g,home:d,x:scatter[i].x,y:scatter[i].y,extraR:scatter[i].r,placed:false};
    g.style.transformBox='view-box';g.style.transformOrigin='0 0';
    g.style.transform=`translate(${st.x}px,${st.y}px) rotate(${st.extraR}deg)`;
    state.push(st);
    g.addEventListener('pointerdown',e=>{if(st.placed)return;drag=st;e.stopPropagation();});
  });
  let drag=null,placedN=0;
  const move=e=>{if(!drag||beat.done)return;const p=pointOf(e,svg);
    drag.x=p.x;drag.y=p.y;
    drag.g.style.transform=`translate(${p.x}px,${p.y}px) rotate(${drag.extraR}deg)`;};
  const up=()=>{if(!drag)return;
    const d=Math.hypot(drag.x-drag.home.tx,drag.y-drag.home.ty);
    if(d<8){drag.placed=true;placedN++;
      drag.g.style.transition='transform .45s cubic-bezier(.2,.8,.3,1.15)';
      drag.g.style.transform=`translate(${drag.home.tx}px,${drag.home.ty}px) rotate(0deg)`;
      AudioSys.pluck(note(3+placedN),.24,1.4);
      if(placedN>=4){oglow.style.transition='opacity 1.6s';
        oglow.style.opacity='1';AudioSys.pluck(note(9),.3,2.6);
        later(()=>markDone(),1000);}}
    drag=null;};
  addEventListener('pointermove',move);addEventListener('pointerup',up);
  cleanupFns.push(()=>{removeEventListener('pointermove',move);removeEventListener('pointerup',up);});
}

function panelBeat(items){return ()=>{

    it.cap?captionHTML(it.cap,it.end?'end':''):panelHTML(it.svg,it.cls||'')).join('')}</div>`;

function matchBeat(){return ()=>{

function endBeat(){return ()=>{
  page.innerHTML=`<div class="panels">${panelHTML(S.finale(),'wide')}
    ${captionHTML('The storm returns what it takes — changed.','end')}</div>
    <div class="card" style="margin-top:10px">

/* chapter progress dots */
for(let c=1;c<=5;c++){const i=document.createElement('i');progress.appendChild(i);}
function paintProgress(ch){[...progress.children].forEach((el,i)=>
  el.classList.toggle('on',i<ch));}

function go(n){
  clearBeat();chev.classList.remove('show');setHint('');
  page.classList.add('out');
  setTimeout(()=>{
    idx=n;beat={done:false,...SCRIPT[n]};
    document.body.dataset.ch=beat.ch;paintProgress(beat.ch);
    if(AudioSys.ctx)AudioSys.setDrone(beat.drone);
    page.classList.remove('out');page.classList.add('pre');page.innerHTML='';
    beat.build();
    requestAnimationFrame(()=>requestAnimationFrame(()=>page.classList.remove('pre')));
  },idx<0?0:460);
}
function advance(){if(beat&&beat.done&&idx<SCRIPT.length-1)go(idx+1);}

document.getElementById('book').addEventListener('pointerdown',e=>{
  AudioSys.ensure();if(AudioSys.ctx&&AudioSys.ctx.state==='suspended')AudioSys.ctx.resume();
  if(!AudioSys.drone&&beat)AudioSys.setDrone(beat.drone);
});
document.getElementById('book').addEventListener('click',e=>{
  if(e.target.closest('button'))return;advance();});
addEventListener('keydown',e=>{
  if(e.key==='Enter'||e.key===' '||e.key==='ArrowRight'){e.preventDefault();advance();}});

document.getElementById('mute').addEventListener('click',e=>{
  e.stopPropagation();AudioSys.ensure();AudioSys.muted=!AudioSys.muted;
  if(AudioSys.gain)AudioSys.gain.gain.value=AudioSys.muted?0:0.8;
  if(AudioSys.muted)AudioSys.stopDrone();else AudioSys.setDrone(beat.drone);
  e.target.textContent=AudioSys.muted?'SOUND OFF':'SOUND ON';});
document.getElementById('restart').addEventListener('click',e=>{
  e.stopPropagation();go(0);});

go(0);
</script>
