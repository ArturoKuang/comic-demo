<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>The Small Love — Part One</title>
<style>
/* ============================================================
   THE CART ON THE STEPPE — an interactive comic, part one
   The kidnapping of Hö'elün, c. 1160 · Prologue + Act I
   Palette shifts per chapter; panels are the storytelling.
   ============================================================ */
:root{
  --gutter:#0a0908;
  --paper:#f0e3cc; --ink:#241812; --accent:#b8412f; --glow:#ff9a3c;
  --soft:rgba(36,24,18,.55);
}
/* 2 prologue night · 3 golden hour · 4 pearl morning · 5 night fire
   6 pewter overcast · 7 ember dark · 8 clear morning */
body[data-ch="2"]{ --paper:#0a0705; --ink:#e8dcc4; --accent:#ff9a3c; --glow:#ffd166; --soft:rgba(232,220,196,.4); }
body[data-ch="3"]{ --paper:#ecd3a3; --ink:#3a2413; --accent:#b8412f; --glow:#ff9a3c; --soft:rgba(58,36,19,.5); }
body[data-ch="4"]{ --paper:#ece8dd; --ink:#2a2622; --accent:#b8412f; --glow:#9fb4c8; --soft:rgba(42,38,34,.5); }
body[data-ch="5"]{ --paper:#1c1310; --ink:#e8dcc4; --accent:#ff9a3c; --glow:#ffd166; --soft:rgba(232,220,196,.42); }
body[data-ch="6"]{ --paper:#b7bcb6; --ink:#242a2e; --accent:#b8412f; --glow:#ffd166; --soft:rgba(36,42,46,.55); }
body[data-ch="7"]{ --paper:#181210; --ink:#d8cbb8; --accent:#e05c34; --glow:#ffd166; --soft:rgba(216,203,184,.4); }
body[data-ch="8"]{ --paper:#e9ddc0; --ink:#1d2733; --accent:#b8412f; --glow:#ffd166; --soft:rgba(29,39,51,.5); }

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:var(--gutter);display:flex;align-items:center;justify-content:center;
  font-family:Georgia,'Times New Roman',serif;overflow:hidden;
  transition:background .8s ease}

/* ---------- the book ---------- */
#book{position:relative;width:min(94vw,460px);height:min(96vh,780px);
  max-height:96vh;aspect-ratio:9/15;
  background:var(--paper);border-radius:10px;overflow:hidden;
  box-shadow:0 30px 80px rgba(0,0,0,.6);
  transition:background .9s ease;touch-action:none;user-select:none}
#page{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:26px 22px 64px;
  opacity:1;transform:none;transition:opacity .45s ease,transform .45s ease}
#page.out{opacity:0;transform:translateY(-16px)}
#page.pre{opacity:0;transform:translateY(22px);transition:none}

/* ---------- chrome ---------- */
#progress{position:absolute;top:14px;left:0;right:0;display:flex;gap:9px;
  justify-content:center;z-index:5;pointer-events:none}
#progress i{width:7px;height:7px;border-radius:50%;
  border:1.4px solid var(--soft);transition:background .4s,border-color .4s}
#progress i.on{background:var(--accent);border-color:var(--accent)}

#mute,#restart{background:none;border:none;
  color:var(--soft);font-family:'Courier New',monospace;font-size:11px;
  letter-spacing:.18em;cursor:pointer;padding:8px}
#restart{position:absolute;top:8px;left:10px;z-index:6}
#soundctl{position:absolute;top:8px;right:10px;z-index:6;display:flex;align-items:center}
#mute:hover,#restart:hover{color:var(--accent)}
#mute:focus-visible,#restart:focus-visible,#vol:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

#vol{-webkit-appearance:none;appearance:none;width:56px;height:14px;
  background:transparent;cursor:pointer;transition:opacity .3s}
#vol::-webkit-slider-runnable-track{height:2px;background:var(--soft);border-radius:1px}
#vol::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:10px;height:10px;
  border-radius:50%;background:var(--accent);border:none;margin-top:-4px}
#vol::-moz-range-track{height:2px;background:var(--soft);border-radius:1px}
#vol::-moz-range-thumb{width:10px;height:10px;border-radius:50%;background:var(--accent);border:none}
#soundctl.muted #vol{opacity:.3}

#chev{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
  z-index:5;color:var(--accent);font-size:20px;opacity:0;pointer-events:none;
  transition:opacity .4s;animation:bob 1.6s ease-in-out infinite}
#chev.show{opacity:.9}
@keyframes bob{0%,100%{transform:translate(-50%,0)}50%{transform:translate(-50%,6px)}}

#hint{position:absolute;bottom:34px;left:0;right:0;text-align:center;z-index:5;
  font-family:'Courier New',monospace;font-size:10.5px;letter-spacing:.28em;
  text-transform:uppercase;color:var(--soft);opacity:0;transition:opacity .5s;
  pointer-events:none;padding:0 20px}
#hint.show{opacity:1}

/* ---------- title / cards ---------- */
.card{text-align:center;color:var(--ink)}
.card .eyebrow{font-family:'Courier New',monospace;font-size:11px;
  letter-spacing:.5em;text-transform:uppercase;color:var(--accent);margin-bottom:22px}
.card h1{font-size:40px;letter-spacing:.12em;font-weight:normal;line-height:1.18}
.card h2{font-size:26px;letter-spacing:.2em;font-weight:normal}
.card .sub{font-style:italic;font-size:15px;margin-top:18px;color:var(--soft);line-height:1.6}
.card .orn{width:150px;margin:26px auto 0;display:block;opacity:.85}
.card .num{font-family:'Courier New',monospace;font-size:12px;letter-spacing:.6em;
  color:var(--soft);margin-bottom:14px}
.card .tap{font-family:'Courier New',monospace;font-style:normal;font-size:10.5px;
  letter-spacing:.3em;text-transform:uppercase;margin-top:30px}

/* title over the camp painting */
.bgimg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
.shade{position:absolute;inset:0;z-index:1;
  background:linear-gradient(180deg,rgba(10,9,8,.18) 26%,rgba(10,9,8,.86) 76%)}
.card.overbg{position:relative;z-index:2;color:#f0e3cc;
  text-shadow:0 2px 16px rgba(0,0,0,.75);margin-top:34vh}
.card.overbg .eyebrow{color:#ffd166}
.card.overbg .sub{color:rgba(240,227,204,.85)}
.card.overbg .orn g{stroke:#ffd166}

/* ---------- panels ---------- */
.panels{width:100%;display:flex;flex-direction:column;gap:14px;align-items:center}
.row{display:flex;gap:10px;width:100%}
.row .panel{flex:1}
.panel{width:100%;background:var(--paper);border:2px solid var(--ink);
  border-radius:3px;overflow:hidden;position:relative;
  box-shadow:4px 5px 0 rgba(0,0,0,.22);
  opacity:0;transform:translateY(18px) rotate(var(--tilt,0deg)) scale(.985);
  transition:opacity .55s ease,transform .55s cubic-bezier(.2,.7,.3,1.05)}
.panel.show{opacity:1;transform:translateY(0) rotate(var(--tilt,0deg)) scale(1)}
.panel svg{display:block;width:100%;height:auto}
.panel video{display:block;width:100%;height:auto;background:#000}
.panel img{display:block;width:100%;height:auto}
.panel.wide{--tilt:-.5deg} .panel.b{--tilt:.6deg} .panel.c{--tilt:-.35deg}

.caption{align-self:flex-start;max-width:86%;background:var(--paper);
  border:1.6px solid var(--ink);padding:7px 12px;font-style:italic;
  font-size:14px;line-height:1.45;color:var(--ink);box-shadow:3px 3px 0 rgba(0,0,0,.2);
  opacity:0;transform:translateY(10px);transition:all .5s ease .1s}
.caption.show{opacity:1;transform:none}
.caption.end{align-self:flex-end}

/* end */
#replay{margin-top:26px;background:none;border:1.6px solid var(--accent);
  color:var(--accent);font-family:Georgia,serif;letter-spacing:.3em;
  text-transform:uppercase;font-size:12px;padding:12px 26px;cursor:pointer}
#replay:hover{background:var(--accent);color:var(--paper)}
#replay:focus-visible{outline:2px solid var(--ink);outline-offset:3px}

.fadein{animation:fin 1.2s ease both}
@keyframes fin{from{opacity:0}to{opacity:1}}

@media (prefers-reduced-motion:reduce){
  #chev{animation:none}
  .panel,.caption,#page{transition-duration:.15s}
}
</style>
</head>
<body data-ch="1">
<div id="book">
  <div id="progress"></div>
  <button id="restart" title="Restart">⟲</button>
  <div id="soundctl">
    <input id="vol" type="range" min="0" max="100" value="100" title="Volume" aria-label="Volume">
    <button id="mute" title="Sound">SOUND ON</button>
  </div>
  <div id="page"></div>
  <div id="hint"></div>
  <div id="chev">▾</div>
</div>

<script>
/* ============================================================
   Audio: pentatonic plucks + wind + fire crackle + axle squeal,
   over the looping "Steppe Wedding" ambient track.
   ============================================================ */
const AudioSys={ctx:null,gain:null,muted:false,vol:1,
  ensure(){ if(this.ctx)return;
    const AC=window.AudioContext||window.webkitAudioContext; if(!AC)return;
    this.ctx=new AC(); this.gain=this.ctx.createGain();
    this.gain.gain.value=this.muted?0:0.8*this.vol; this.gain.connect(this.ctx.destination);},
  setVol(v){ this.vol=v; if(this.gain)this.gain.gain.value=this.muted?0:0.8*v;},
  pluck(f,vol=.25,dur=1.1){ if(!this.ctx||this.muted)return;
    const t=this.ctx.currentTime,o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type='triangle';o.frequency.value=f;
    g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);
    o.connect(g);g.connect(this.gain);o.start(t);o.stop(t+dur);},
  thump(vol=.5){ if(!this.ctx||this.muted)return;
    const t=this.ctx.currentTime,o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type='sine';o.frequency.setValueAtTime(110,t);
    o.frequency.exponentialRampToValueAtTime(46,t+.16);
    g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.001,t+.3);
    o.connect(g);g.connect(this.gain);o.start(t);o.stop(t+.32);},
  crackle(dur=2.2,vol=.12){ if(!this.ctx||this.muted)return;
    const t0=this.ctx.currentTime;
    for(let i=0;i<Math.floor(dur*9);i++){const t=t0+Math.random()*dur;
      const o=this.ctx.createOscillator(),g=this.ctx.createGain();
      o.type='square';o.frequency.value=1400+Math.random()*2600;
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol*(.3+Math.random()*.7),t+.004);
      g.gain.exponentialRampToValueAtTime(.001,t+.05);
      o.connect(g);g.connect(this.gain);o.start(t);o.stop(t+.06);}},
  squeal(reps=2,vol=.045){ if(!this.ctx||this.muted)return;
    const t0=this.ctx.currentTime;
    for(let i=0;i<reps;i++){const t=t0+i*1.15;
      const o=this.ctx.createOscillator(),g=this.ctx.createGain(),f=this.ctx.createBiquadFilter();
      o.type='sawtooth';f.type='bandpass';f.frequency.value=1200;f.Q.value=8;
      o.frequency.setValueAtTime(900,t);o.frequency.linearRampToValueAtTime(1500,t+.35);
      o.frequency.linearRampToValueAtTime(700,t+.75);
      g.gain.setValueAtTime(.0001,t);g.gain.linearRampToValueAtTime(vol,t+.1);
      g.gain.linearRampToValueAtTime(.0001,t+.8);
      o.connect(f);f.connect(g);g.connect(this.gain);o.start(t);o.stop(t+.85);}}
};
const PENTA=[220,261.6,293.7,329.6,392,440,523.2];
const note=i=>PENTA[((i%PENTA.length)+PENTA.length)%PENTA.length];

/* the ambient track — the sound of the wedding camp. It plays straight
   through and loops naturally; the story progression lives entirely in
   its volume: full for the festivities and the bright departure morning,
   low for ceremony and firelight, near-silence at the prologue and the
   turn — and at the end it recedes with the camp as the cart rolls away. */
const Ambient={el:null,muted:false,target:.2,vol:1,_iv:null,
  ensure(){ if(this.el)return;
    this.el=new Audio('assets/steppe-wedding.wav');this.el.loop=true;this.el.volume=0;},
  _ramp(to,ms){ if(!this.el||this.el.paused)return;
    const from=this.el.volume,t0=performance.now();clearInterval(this._iv);
    this._iv=setInterval(()=>{const k=Math.min(1,(performance.now()-t0)/ms);
      this.el.volume=from+(to-from)*k;if(k>=1)clearInterval(this._iv);},50);},
  fadeTo(v,ms=1100){ this.target=v;this._ramp(v*this.vol,ms);},
  start(){ this.ensure();
    if(this.muted||(this.el&&!this.el.paused))return;
    this.el.play().then(()=>this._ramp(this.target*this.vol,1100)).catch(()=>{});},
  setVol(v){ this.vol=v;this._ramp(this.target*this.vol,150);},
  setMuted(m){ this.muted=m;this.ensure();
    if(m){clearInterval(this._iv);this.el.pause();}
    else{this.el.play().then(()=>this._ramp(this.target*this.vol,600)).catch(()=>{});}}
};

  /* FRAME 5 — the boot stitch & the secret sash */
  stitchScene(){return `<svg viewBox="0 0 100 58">

  /* FRAME 6 — the wind rope (a) wide */
  windWide(){return `<svg viewBox="0 0 100 50">
    <rect width="100" height="50" fill="var(--paper)"/>
    <path d="M2 8 q24-3 48 0 t48-1" stroke="#9aa39f" stroke-width="3.4" fill="none" opacity=".5"/>
    <path d="M-4 15 q30-4 60 0 t44-2" stroke="#a3aaa4" stroke-width="2.6" fill="none" opacity=".45"/>
    <rect y="36" width="100" height="14" fill="#7e8578" opacity=".55"/>

/* ============================================================
   Engine
   ============================================================ */
const page=document.getElementById('page'), hint=document.getElementById('hint'),
      chev=document.getElementById('chev'), progress=document.getElementById('progress');
let idx=-1, beat=null, cleanupFns=[], rafs=[], timers=[];
function later(fn,ms){timers.push(setTimeout(fn,ms));}
function everyFrame(fn){let id;const loop=t=>{fn(t);id=requestAnimationFrame(loop);};
  id=requestAnimationFrame(loop);rafs.push(()=>cancelAnimationFrame(id));}
function clearBeat(){cleanupFns.forEach(f=>f());cleanupFns=[];
  rafs.forEach(f=>f());rafs=[];timers.forEach(t=>clearTimeout(t));timers=[];}
function setHint(t){hint.textContent=t||'';hint.classList.toggle('show',!!t);}
function markDone(){beat.done=true;chev.classList.add('show');setHint('');AudioSys.pluck(note(6),.18,1.6);}
function panelHTML(svg,cls=''){return `<div class="panel ${cls}">${svg}</div>`;}
function captionHTML(t,end=''){return `<div class="caption ${end}">${t}</div>`;}
function revealSeq(sel,base=250,step=520){
  [...page.querySelectorAll(sel)].forEach((el,i)=>later(()=>{el.classList.add('show');
    AudioSys.pluck(note(i+1),.1,1);},base+i*step));}
function pointOf(e,svg){const r=svg.getBoundingClientRect();
  const vb=svg.viewBox.baseVal;
  return {x:(e.clientX-r.left)/r.width*vb.width, y:(e.clientY-r.top)/r.height*vb.height};}
function moveG(el,x,y,extra=''){el.style.transformBox='view-box';
  el.style.transform=`translate(${x}px,${y}px) ${extra}`;}
function appendCaption(text,end){const cap=document.createElement('div');
  cap.className='caption'+(end?' end':'');cap.innerHTML=text;
  page.querySelector('.panels').appendChild(cap);
  requestAnimationFrame(()=>cap.classList.add('show'));return cap;}

/* generic dotted-trace interaction (stitching, the ash road) */
function traceSetup(svg,pts,onStep,onComplete){
  const trail=svg.querySelector('#trail');
  pts.forEach((p,i)=>{const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx',p.x);c.setAttribute('cy',p.y);c.setAttribute('r',i===0?2.2:1.5);
    c.setAttribute('fill','var(--accent)');c.setAttribute('opacity',i===0?'.9':'.22');
    trail.appendChild(c);p.el=c;});
  let nextI=0,down=false;
  const move=e=>{if(!down||beat.done||nextI>=pts.length)return;
    const p=pointOf(e,svg),t=pts[nextI];
    if(Math.hypot(p.x-t.x,p.y-t.y)<7.5){t.el.setAttribute('opacity','1');
      t.el.setAttribute('r','2.2');
      if(nextI>0){const l=document.createElementNS('http://www.w3.org/2000/svg','line');
        const a=pts[nextI-1];l.setAttribute('x1',a.x);l.setAttribute('y1',a.y);
        l.setAttribute('x2',t.x);l.setAttribute('y2',t.y);
        l.setAttribute('stroke','var(--accent)');l.setAttribute('stroke-width','1');
        l.setAttribute('opacity','.8');trail.appendChild(l);}
      AudioSys.pluck(note(nextI),.14,.9);if(onStep)onStep(nextI);nextI++;
      if(nextI<pts.length)pts[nextI].el.setAttribute('opacity','.6');
      else onComplete(trail);}};
  const d=e=>{down=true;move(e);},u=()=>{down=false;};
  svg.addEventListener('pointerdown',d);addEventListener('pointermove',move);
  addEventListener('pointerup',u);
  cleanupFns.push(()=>{removeEventListener('pointermove',move);removeEventListener('pointerup',u);});
}

function beatCast(){
  page.innerHTML=`<div class="panels">
    ${captionHTML('Olkhonud country, high summer — the season of journeys, bargains, and weddings. After months of negotiation, two young people who had never properly met were to be married.')}
    <div class="row">
      <div class="panel b"><img src="assets/hoelun.png" alt="Hö'elün"></div>

  revealSeq('.panel,.caption',250,540);

  page.innerHTML=`<div class="panels">
    ${panelHTML(S.fistScene(),'wide')}
    ${captionHTML('&ldquo;The story of my son does not begin at his birth.&rdquo;')}
    ${captionHTML('&ldquo;It begins with a cart.&rdquo;','end')}</div>`;
  const caps=page.querySelectorAll('.caption');
  later(()=>page.querySelector('.panel').classList.add('show'),250);
  const glow=page.querySelector('#fireglow');
  everyFrame(now=>{if(glow)glow.setAttribute('opacity',
    (.05+Math.abs(Math.sin(now/290))*.055).toFixed(3));});
  later(()=>caps[0].classList.add('show'),1500);
  later(()=>caps[1].classList.add('show'),3300);
  later(()=>AudioSys.squeal(2,.04),4300);
  later(()=>{if(!beat.done)markDone();},5800);
  const fast=()=>{page.querySelectorAll('.panel,.caption').forEach(el=>el.classList.add('show'));
    later(()=>{if(!beat.done)markDone();},260);};
  page.addEventListener('pointerdown',fast,{once:true});
}

/* FRAMES 1–3 — the film beats */
function videoBeat({src,ar,pre,post}){return ()=>{
  page.innerHTML=`<div class="panels">
    ${pre?captionHTML(pre):''}
    <div class="panel wide"><video src="${src}" style="aspect-ratio:${ar||'992/432'}" playsinline muted preload="auto"></video></div>
    ${post?captionHTML(post,'end'):''}</div>`;
  const caps=page.querySelectorAll('.caption');
  later(()=>{if(pre)caps[0].classList.add('show');},300);
  later(()=>page.querySelector('.panel').classList.add('show'),550);
  const v=page.querySelector('video');
  const tryPlay=()=>{v.play().then(()=>setHint('')).catch(()=>setHint('tap the panel to play'));};
  later(tryPlay,750);
  v.addEventListener('pointerdown',e=>{e.stopPropagation();if(v.paused)tryPlay();});
  const finish=()=>{if(beat.done)return;
    if(post)caps[caps.length-1].classList.add('show');
    markDone();};
  v.addEventListener('ended',finish);
  v.addEventListener('error',()=>{setHint('');finish();});
  cleanupFns.push(()=>{try{v.pause();v.removeAttribute('src');v.load();}catch(_){}});
};}

/* FRAME 4 — two bowls: serve, glance away, swap */
function interBowls(){
  page.innerHTML=`<div class="panels">
    ${captionHTML('That night, in the small ger they now shared, ceremony gave way to supper. They were still nearly strangers, so kindness had to speak before either of them could.')}
    ${panelHTML(S.bowlsScene(),'wide')}</div>`;
  revealSeq('.panel,.caption');
  setHint('serve him the rich bowl — drag it across the fire');
  const svg=page.querySelector('.panel svg'),
        bowlR=svg.querySelector('#bowlR'),bowlP=svg.querySelector('#bowlP'),
        tgt=svg.querySelector('#tgt'),herHead=svg.querySelector('#herHead'),
        smA=svg.querySelector('#smA'),smB=svg.querySelector('#smB'),
        fl=svg.querySelector('#fl');
  let phase=0,drag=false,bx=32,by=50;
  const setB=(x,y)=>{bx=x;by=y;moveG(bowlR,x,y);};
  setB(32,50);moveG(bowlP,40,53);moveG(tgt,66,50);
  everyFrame(now=>{fl.style.transform=`scale(${1+Math.sin(now/95)*.05})`;});
  const fireTick=()=>{AudioSys.crackle(1.1,.05);
    timers.push(setTimeout(fireTick,2400+Math.random()*2200));};
  later(fireTick,900);
  const down=e=>{const p=pointOf(e,svg);
    if(Math.hypot(p.x-bx,p.y-by)<9){drag=true;e.stopPropagation();}};
  const move=e=>{if(!drag||beat.done)return;const p=pointOf(e,svg);
    setB(Math.max(6,Math.min(94,p.x)),Math.max(38,Math.min(58,p.y)));};
  const up=()=>{if(!drag)return;drag=false;
    if(phase===0&&Math.hypot(bx-66,by-50)<8){phase=1;setB(66,50);
      AudioSys.pluck(note(4),.22,1.3);
      later(()=>{herHead.style.transformBox='view-box';
        herHead.style.transformOrigin='23px 39px';
        herHead.style.transition='transform 1s ease';
        herHead.style.transform='rotate(-16deg)';
        moveG(tgt,32,50);
        setHint('she looks away — swap it back');},700);}
    else if(phase===1&&Math.hypot(bx-32,by-50)<8){phase=2;setB(32,50);
      tgt.style.opacity='0';
      bowlP.style.transition='transform 1s ease';moveG(bowlP,66,52);
      AudioSys.pluck(note(7),.24,1.6);
      later(()=>{herHead.style.transform='rotate(0deg)';},700);
      later(()=>{smA.setAttribute('opacity','1');smB.setAttribute('opacity','1');
        AudioSys.pluck(note(9),.2,2);},1500);
      later(()=>{appendCaption('She gave him the richest cut, the portion reserved for an honored guest. When she looked away, he traded their bowls and returned it to her. Their marriage began as a quiet contest: each trying to give the other more.','end');
        markDone();},2100);}};
  svg.addEventListener('pointerdown',down);
  addEventListener('pointermove',move);addEventListener('pointerup',up);
  cleanupFns.push(()=>{removeEventListener('pointermove',move);removeEventListener('pointerup',up);});
}

/* FRAME 5 — the boot stitch, then the secret */
function interStitch(){
  page.innerHTML=`<div class="panels">
    ${captionHTML('A few days later, before dawn, she mended a split seam in his riding boot and returned it to the place where he had left it. The gift required no thanks because he would never know.')}
    ${panelHTML(S.stitchScene(),'wide')}</div>`;
  revealSeq('.panel,.caption');
  setHint('mend the seam — follow the stitches');
  const fireTick=()=>{AudioSys.crackle(.9,.04);
    timers.push(setTimeout(fireTick,3000+Math.random()*2600));};
  later(fireTick,1200);
  const svg=page.querySelector('.panel svg'),secret=svg.querySelector('#secret');
  const pts=[{x:44,y:25},{x:47,y:28},{x:45,y:32},{x:48,y:35},{x:46,y:39},{x:51,y:42},{x:56,y:43}];
  traceSetup(svg,pts,null,()=>{
    later(()=>{secret.style.transition='opacity 1.6s';secret.style.opacity='1';
      AudioSys.pluck(note(9),.28,2.4);},500);
    later(()=>{appendCaption('Beside her workbasket lay a second secret: a half-woven sash in Merkit indigo, measured against his old one while he slept. She meant to finish it before they reached his homeland. She never did.','end');
      markDone();},1600);});
}

/* FRAME 6 — the wind rope */
function beatWind(){
  page.innerHTML=`<div class="panels">
    ${panelHTML(S.windWide(),'wide')}
    ${captionHTML('On a grey, hard-wind day, Chiledu pulled the storm ropes tight over the ger. That work was expected of him.')}
    ${panelHTML(S.windDoor(),'b')}
    ${captionHTML('Then he moved the fuel to the sheltered side of the door, so Hö&rsquo;elün would not have to face the wind that night. He meant to do it unseen. She saw him through the door flap, and understood that he was playing the same game.','end')}</div>`;
  revealSeq('.panel,.caption',250,640);
  const inner=page.querySelectorAll('.panel svg')[0];
  everyFrame(now=>{if(inner)inner.style.transform=`translateX(${Math.sin(now/240)*.9}px)`;});
  const fast=()=>{page.querySelectorAll('.panel,.caption').forEach(el=>el.classList.add('show'));
    later(()=>{if(!beat.done)markDone();},260);};
  page.addEventListener('pointerdown',fast,{once:true});
  later(()=>{if(!beat.done)markDone();},3600);
}

/* FRAME 7 — the ash map */
function interAsh(){
  page.innerHTML=`<div class="panels">
    ${captionHTML('When the wedding visit ended, Chiledu had to take his bride home to his Merkit kin in the northwest. In the hearth ash he traced their route across weeks of open country, far from either clan&rsquo;s protection.')}
    ${panelHTML(S.ashScene(),'wide')}</div>`;
  revealSeq('.panel,.caption');
  setHint('walk the stick along the road — through the empty land');

    timers.push(setTimeout(emberTick,3600+Math.random()*2600));};
  later(emberTick,1500);
  const svg=page.querySelector('.panel svg'),emb=svg.querySelector('#embGlow');
  everyFrame(now=>{if(emb)emb.setAttribute('opacity',(.24+Math.abs(Math.sin(now/260))*.16).toFixed(3));});
  const pts=[{x:70,y:50},{x:64,y:45.5},{x:58,y:41},{x:52,y:37},
             {x:45,y:31.5},{x:36,y:25},{x:28,y:19},{x:22,y:14.5},{x:17,y:11}];

    later(()=>{appendCaption('At the emptiest stretch, he looked up and asked whether she was willing to make the journey. She studied the road, then nodded. He accepted her answer without argument. From then on, he trusted her judgment as completely as she trusted his hands.','end');},400);
    later(()=>{trail.style.transition='opacity 1.4s';trail.style.opacity='0';},1900);

/* FRAME 8 — packing the cart, twice adjusted at her frown */
function interPack(){
  page.innerHTML=`<div class="panels">
    ${captionHTML('On the morning of departure, Hö&rsquo;elün directed the loading from the cart bed. The chest, folded ger, tools, and stores formed her household; packing them for the road was her work to command.')}
    ${panelHTML(S.packScene(),'wide')}</div>`;
  revealSeq('.panel,.caption');
  setHint('haul the chest where she points');
  const svg=page.querySelector('.panel svg'),
        chest=svg.querySelector('#chest'),tgt=svg.querySelector('#tgt'),
        frown=svg.querySelector('#frown'),head=svg.querySelector('#herHeadP'),
        lash=svg.querySelector('#lash'),sash=svg.querySelector('#sashRoll');
  const spots=[{x:61,y:27.5},{x:70.5,y:27.5},{x:65.5,y:27.5}];
  let si=0,drag=false,cx=16,cy=56;
  const setC=(x,y)=>{cx=x;cy=y;moveG(chest,x,y);};
  setC(16,56);moveG(tgt,spots[0].x,spots[0].y);
  head.style.transformBox='view-box';head.style.transformOrigin='74px 22px';
  const down=e=>{const p=pointOf(e,svg);
    if(Math.hypot(p.x-cx,p.y-cy)<10){drag=true;e.stopPropagation();}};
  const move=e=>{if(!drag||beat.done)return;const p=pointOf(e,svg);
    setC(Math.max(9,Math.min(91,p.x)),Math.max(16,Math.min(58,p.y)));};
  const up=()=>{if(!drag||beat.done)return;drag=false;
    const sp=spots[si];
    if(Math.hypot(cx-sp.x,cy-sp.y)<7){
      setC(sp.x,sp.y);
      if(si<2){si++;
        frown.setAttribute('opacity','1');
        head.style.transition='transform .5s ease';head.style.transform='rotate(7deg)';
        AudioSys.pluck(note(0),.16,.7);
        later(()=>{head.style.transform='rotate(0deg)';frown.setAttribute('opacity','0');},900);
        moveG(tgt,spots[si].x,spots[si].y);
        setHint(si===1?'her frown says: not there':'once more — where she points');}
      else{
        tgt.style.opacity='0';AudioSys.thump(.4);
        lash.style.transition='opacity 1.2s';lash.style.opacity='1';
        [3,5,7].forEach((n,i)=>later(()=>AudioSys.pluck(note(n),.18,1),300+i*260));
        later(()=>{sash.style.opacity='1';moveG(sash,71,25);
          later(()=>{sash.style.transition='transform 1.1s ease, opacity .4s';
            moveG(sash,65.5,20.8);AudioSys.pluck(note(9),.22,1.8);},420);},1100);
        later(()=>{appendCaption('Chiledu shifted the chest until its weight sat where she wanted it. Hö&rsquo;elün checked the ropes, then tucked the unfinished indigo sash beneath them with her own hands. Everything they would need now traveled under her eye.','end');
          markDone();},2600);}}};
  svg.addEventListener('pointerdown',down);
  addEventListener('pointermove',move);addEventListener('pointerup',up);
  cleanupFns.push(()=>{removeEventListener('pointermove',move);removeEventListener('pointerup',up);});
}

/* FRAME 9 — yoking the mare: three straps, then the greeting */
function interYoke(){
  page.innerHTML=`<div class="panels">
    ${captionHTML('She yoked the dun mare herself, seating each strap and testing it with a hard tug. On the open steppe, a careless knot could cost them food, shelter, or the cart itself.')}
    ${panelHTML(S.yokeScene(),'wide')}</div>`;
  revealSeq('.panel,.caption');
  setHint('cinch each strap tight');
  const svg=page.querySelector('.panel svg'),mare=svg.querySelector('#mareG'),
        ear=svg.querySelector('#ear'),puffs=svg.querySelector('#puffs'),
        noseHot=svg.querySelector('#noseHot');
  const taut={s1:'M55 27.5 Q50 42.5 45.5 40.8',s2:'M45 28 Q37 35 39.5 43',s3:'M60 26.5 Q63 32 60.5 37.5'};
  const hots=[...svg.querySelectorAll('.hot')];
  let cinched=0,phase=0;
  mare.style.transformBox='view-box';
  everyFrame(now=>{
    hots.forEach((h,i)=>{if(h.dataset.done)return;
      h.setAttribute('opacity',(.32+Math.abs(Math.sin(now/300+i))*.3).toFixed(2));});
    if(phase===1)noseHot.setAttribute('opacity',(.2+Math.abs(Math.sin(now/300))*.35).toFixed(2));});
  const tap=e=>{const p=pointOf(e,svg);
    if(phase===0){
      for(const h of hots){if(h.dataset.done)continue;
        const hx=+h.getAttribute('cx'),hy=+h.getAttribute('cy');
        if(Math.hypot(p.x-hx,p.y-hy)<7){
          h.dataset.done='1';h.setAttribute('opacity','0');
          const s=svg.querySelector('#'+h.dataset.s);
          s.setAttribute('d',taut[h.dataset.s]);s.removeAttribute('stroke-dasharray');
          s.setAttribute('stroke-width','1.5');
          AudioSys.thump(.4);AudioSys.pluck(note(2+cinched*2),.2,1);
          mare.style.transition='transform .16s ease';
          mare.style.transform='translateY(1.6px)';
          later(()=>{mare.style.transform='translateY(0)';},170);
          cinched++;
          if(cinched>=3){phase=1;setHint('now greet her — touch her muzzle');}
          break;}}}
    else if(phase===1&&Math.hypot(p.x-80,p.y-25)<7){
      phase=2;noseHot.setAttribute('opacity','0');
      ear.style.transformBox='view-box';ear.style.transformOrigin='75px 17px';
      ear.style.transition='transform .8s ease';ear.style.transform='rotate(26deg)';
      AudioSys.pluck(note(6),.2,1.6);
      puffs.style.transition='opacity .7s';puffs.style.opacity='.8';
      later(()=>{puffs.style.opacity='0';},1500);
      later(()=>{appendCaption('Last came the horsewoman&rsquo;s greeting: a slow breath into the mare&rsquo;s nostrils, then a quiet word as one ear turned toward her. The household was ready to move.','end');
        markDone();},1200);}};
  svg.addEventListener('pointerdown',tap);
}

/* FRAME 10 — setting out: milk to the sky */
function interDepart(){
  page.innerHTML=`<div class="panels">
    ${captionHTML('Hö&rsquo;elün drove the cart; Chiledu rode beside her, close enough to reach the rail. She kept her face toward the road. He looked back once at the shrinking camp, then matched his horse to the mare&rsquo;s pace.')}
    ${panelHTML(S.departScene(),'wide')}</div>`;
  revealSeq('.panel,.caption');
  setHint('three drops of milk for the road — flick up from the bowl');
  const svg=page.querySelector('.panel svg'),drops=svg.querySelector('#drops'),
        travel=svg.querySelector('#travel');
  let flicks=0,startP=null,anims=[];
  everyFrame(now=>{anims=anims.filter(a=>{
    const t=(now-a.t0)/700;
    if(t>=1){a.el.remove();return false;}
    const x=a.x0+a.vx*t, y=a.y0-38*t*a.up+26*t*t;
    a.el.setAttribute('cx',x);a.el.setAttribute('cy',y);
    a.el.setAttribute('opacity',t>.7?String(1-(t-.7)/.3):'1');
    a.el.setAttribute('stroke',t>.25&&t<.65?'#ffd166':'none');
    return true;});});
  const down=e=>{const p=pointOf(e,svg);
    if(Math.hypot(p.x-16,p.y-56)<12){startP=p;e.stopPropagation();}};
  const up=e=>{if(!startP||beat.done&&flicks>=3)return;const p=pointOf(e,svg);
    if(p.y<startP.y-7&&flicks<3){flicks++;
      for(let i=0;i<5;i++){
        const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
        c.setAttribute('r',.9);c.setAttribute('fill','#fdfaf2');
        c.setAttribute('stroke-width','.4');drops.appendChild(c);
        anims.push({el:c,t0:performance.now()+i*55,x0:16,y0:54,
          vx:10+Math.random()*14,up:.9+Math.random()*.3});}
      AudioSys.pluck(note(2+flicks*2),.2,1.2);
      if(flicks>=3){
        setHint('');
        later(()=>{appendCaption('She flicked three drops of milk toward the Eternal Blue Sky, asking safe passage for their household.<br><i>The road accepted the offering, but made no promise.</i>');},900);
        later(()=>{travel.style.transformBox='view-box';
          travel.style.transformOrigin='55px 27px';
          travel.style.transition='transform 6s ease-in';
          travel.style.transform='scale(.45)';
          AudioSys.squeal(4,.04);
          /* the wedding music is the camp's sound — it recedes with it */
          Ambient.fadeTo(.05,6000);},1700);
        later(()=>AudioSys.squeal(3,.03),6300);
        later(()=>{appendCaption('The axle found its rhythm as the cart rolled north. Across open grass, that thin wooden cry could travel for miles. Their new life had begun, and the steppe could hear it coming.','end');
          markDone();},5200);}}
    startP=null;};
  svg.addEventListener('pointerdown',down);addEventListener('pointerup',up);
  cleanupFns.push(()=>removeEventListener('pointerup',up));
}

function endBeat(){return ()=>{
  page.innerHTML=`<div class="card fadein">
    <div class="num">✶</div>
    <h2>END OF PART ONE</h2>
    ${S.ornament()}
    <div class="sub">&ldquo;We had eleven days on that road.<br>I remember every one.&rdquo;</div>
    <button id="replay">Read again</button></div>`;
  [0,2,4,6].forEach((n,i)=>later(()=>AudioSys.pluck(note(n),.14,1.8),600+i*420));
  page.querySelector('#replay').addEventListener('click',e=>{e.stopPropagation();go(0);});
  later(()=>{beat.done=true;},1200);};}

/* ---------- the script ----------
   ch: palette · amb: music volume for the beat */
const SCRIPT=[
 {ch:1,amb:.20,build:beatTitle},
 {ch:2,amb:.04,build:beatFist},
 {ch:3,amb:.18,build:beatCast},
 {ch:3,amb:.22,build:videoBeat({src:'assets/arrival.mp4',ar:'2206/946',
   pre:'At golden hour, Chiledu&rsquo;s party entered the Olkhonud camp with horses and camels promised in the marriage bargain. After months of words exchanged by other people, the man himself had finally arrived.',
   post:'Hö&rsquo;elün watched from the edge of the camp. Chiledu sat straight with ceremony, but his hands stayed quiet on the reins. She could not choose the bargain; she could begin to judge the man.'})},
 {ch:4,amb:.16,build:videoBeat({src:'assets/braiding.mp4',
   pre:'On the wedding morning, her mother&rsquo;s hands gathered the loose plaits of girlhood into the two heavy braids of a married woman, fastening silver at their ends.',
   post:'Then her mother walked beside her along the white felt. At its end, Chiledu waited with the dun mare that would draw Hö&rsquo;elün&rsquo;s cart. In those few steps, the marriage became real.'})},
 {ch:4,amb:.16,build:videoBeat({src:'assets/khadag.mp4',
   pre:'Inside the ger, a sky-blue khadag lay between them. Hö&rsquo;elün crossed the firelight carrying a bowl of milk and offered it with both hands.',
   post:'She lowered her eyes for the offering, then raised them and held Chiledu&rsquo;s gaze. The families had arranged the marriage; this first act of recognition belonged to the two of them.'})},
 {ch:5,amb:.09,build:interBowls},
 {ch:5,amb:.07,build:interStitch},
 {ch:6,amb:.08,build:beatWind},
 {ch:7,amb:.045,build:interAsh},
 {ch:8,amb:.20,build:interPack},
 {ch:8,amb:.16,build:interYoke},
 {ch:8,amb:.16,build:interDepart},
 {ch:8,amb:.05,build:endBeat()},
];

/* chapter progress dots */
for(let c=1;c<=8;c++){const i=document.createElement('i');progress.appendChild(i);}
function paintProgress(ch){[...progress.children].forEach((el,i)=>
  el.classList.toggle('on',i<ch));}

function go(n){
  clearBeat();chev.classList.remove('show');setHint('');
  page.classList.add('out');
  setTimeout(()=>{
    idx=n;beat={done:false,...SCRIPT[n]};
    document.body.dataset.ch=beat.ch;paintProgress(beat.ch);
    Ambient.fadeTo(beat.amb??.2);
    page.classList.remove('out');page.classList.add('pre');page.innerHTML='';
    beat.build();
    requestAnimationFrame(()=>requestAnimationFrame(()=>page.classList.remove('pre')));
  },idx<0?0:460);
}
function advance(){if(beat&&beat.done&&idx<SCRIPT.length-1)go(idx+1);}

document.getElementById('book').addEventListener('pointerdown',e=>{
  AudioSys.ensure();if(AudioSys.ctx&&AudioSys.ctx.state==='suspended')AudioSys.ctx.resume();
  Ambient.start();
});
document.getElementById('book').addEventListener('click',e=>{
  if(e.target.closest('button,input'))return;advance();});
addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(e.key==='Enter'||e.key===' '||e.key==='ArrowRight'){e.preventDefault();advance();}});

document.getElementById('mute').addEventListener('click',e=>{
  e.stopPropagation();AudioSys.ensure();AudioSys.muted=!AudioSys.muted;
  if(AudioSys.gain)AudioSys.gain.gain.value=AudioSys.muted?0:0.8*AudioSys.vol;
  Ambient.setMuted(AudioSys.muted);
  document.getElementById('soundctl').classList.toggle('muted',AudioSys.muted);
  e.target.textContent=AudioSys.muted?'SOUND OFF':'SOUND ON';});
document.getElementById('vol').addEventListener('input',e=>{
  const v=e.target.value/100;AudioSys.setVol(v);Ambient.setVol(v);});
document.getElementById('restart').addEventListener('click',e=>{
  e.stopPropagation();go(0);});

const hashBeat=location.hash.match(/beat=(\d+)/);
go(hashBeat?Math.min(SCRIPT.length-1,+hashBeat[1]):0);
</script>
